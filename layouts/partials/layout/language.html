{{/* ── Desktop: dropdown ────────────────────────────────────────────── */}}

<div class="relative px-3 py-2 lg:p-0 h-full flex items-center gap-4 lg:order-2 space-x-1 bg-transparent lg:space-x-0 rtl:space-x-reverse lg:w-auto w-full justify-between">
    
    <div class="hidden lg:block relative">
    <!-- SELECT TRANSLATION BUTTON -->
    <button type="button" data-dropdown-toggle="language-dropdown-menu"
        class="inline-flex items-center justify-center text-sm text-inherit rounded-lg cursor-pointer mt-1">
        <i data-lucide="globe" class="w-5 h-5 text-inherit"></i>
        <label class="ml-1 inline-flex items-center cursor-pointer text-black text-xl lg:text-base">
            {{ i18n "language" }}
            <i data-lucide="chevron-down" class="w-3 h-3 ml-1"></i>
        </label>
    </button>

    <!-- TRANSLATIONS-->
    <div class="absolute top-full right-0 z-50 hidden border rounded-lg overflow-hidden text-base list-none bg-white shadow-lg" id="language-dropdown-menu">
        <ul class="py-2 font-medium" role="none">
            {{ range . }}
            <li>
                <a href="{{.Permalink}}" class="block px-4 py-2 text-base hover:bg-primary/20 hover:text-primary " role="menuitem">
                    <div class="inline-flex items-center">
                        <label class="block pl-2 cursor-pointer">{{.Language.LanguageName }}</label>
                    </div>
                </a>
            </li>
            {{end}}
        </ul>
    </div>
    </div>


    {{/* ── Mobil: matcher nav-elementenes stil ──────────────────────────── */}}
    <div class="lg:hidden">
        <span class="flex items-center gap-1.5 text-xl text-gray-700 px-3 mb-2">
            <i data-lucide="globe" class="w-4 h-4" aria-hidden="true"></i>
            {{ i18n "language" }}
        </span>
        {{ range . }}
        <a href="{{.Permalink}}"
            class="block text-xl tracking-wide py-2 px-3 rounded text-gray-900
                hover:bg-slate-50">
            {{.Language.LanguageName}}
        </a>
        {{ end }}
    </div>
</div>
