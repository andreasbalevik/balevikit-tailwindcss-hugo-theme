{{/* Breakpoint Indicator — Development Only */}}
{{ if eq hugo.Environment "development" }}
<div class="fixed top-[-5px] left-0 right-0 z-1000 text-center font-mono text-xs font-semibold text-white py-1">
  <!-- xs: 0px (default) -->
  <div class="block sm:hidden bg-red-600">📱 Mobile (xs)</div>
  
  <!-- sm: 640px -->
  <div class="hidden sm:block md:hidden bg-orange-500">📱 Tablet (sm)</div>
  
  <!-- md: 768px -->
  <div class="hidden md:block lg:hidden bg-amber-500">📱 Medium (md)</div>
  
  <!-- lg: 1024px -->
  <div class="hidden lg:block xl:hidden bg-blue-500">🖥️ Desktop (lg)</div>
  
  <!-- xl: 1280px -->
  <div class="hidden xl:block 2xl:hidden bg-blue-600">🖥️ Desktop (xl)</div>
  
  <!-- 2xl: 1536px -->
  <div class="hidden 2xl:block bg-indigo-600">🖥️ Wide (2xl)</div>
</div>
{{ end }}
