<button onclick="scrollToTop()" id="scroll-to-top"
        aria-label="{{ i18n "scrollToTop" | default "Gå til toppen" }}"
        class="scroll-to-top fixed bottom-4 right-4 z-50
               rounded-full bg-primary text-white shadow
               hover:bg-primary/90 active:bg-primary/80
               transition-all duration-300 p-3
               focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary">
    <i data-lucide="arrow-up" class="w-6 h-6" aria-hidden="true"></i>
</button>


<script>
    const scrollToTopButton =
        document.getElementById('scroll-to-top');
    scrollToTopButton.style.display = 'none';

    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 100) {
            scrollToTopButton.style.display = 'block';
        } else {
            scrollToTopButton.style.display = 'none';
        }
    });

    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }              
</script>
