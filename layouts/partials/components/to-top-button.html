<button onclick="scrollToTop()" id="scroll-to-top" class="scroll-to-top fixed bottom-4 right-4
                       rounded-full bg-white 
                       transition duration-300 hover:bg-gray-100 
                       p-2 border-solid border-4 border-gray-700 z-100">
    <i data-lucide="arrow-up" class="w-8 h-8 lg:w-10 lg:h-10 text-gray-950"></i>
</button>


<script>
    const scrollToTopButton =
        document.getElementById('scroll-to-top');
    scrollToTopButton.style.display = 'none';

    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 100) {
            scrollToTopButton.style.display = 'block';
        } else {
            scrollToTopButton.style.display = 'none';
        }
    });

    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    }              
</script>
