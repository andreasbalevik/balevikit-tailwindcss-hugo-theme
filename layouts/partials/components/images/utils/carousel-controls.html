{{ $images_length := len . }}

{{ if gt $images_length 1}}

<!-- Slider indicators -->
<div id="carousel-controls" class="absolute z-30 flex -translate-x-1/2 bottom-5 left-1/2 space-x-3 rtl:space-x-reverse">

    {{ $counter := 0 }}
    {{ range . }}
    <button type="button" class="w-3 h-3 shadow rounded-full bg-gray-300 hover:bg-gray-400 transition-colors duration-300" aria-current="true" aria-label="Slide {{$counter}}"
        data-carousel-slide-to="{{$counter}}"></button>
    {{ $counter = add $counter 1 }}
    {{ end }}

</div>

<!-- Slider controls -->
<button type="button"
    class="carousel-control-btn absolute top-0 start-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none"
    data-carousel-prev>
    <span class="shadow inline-flex items-center justify-center w-10 h-10 rounded-full bg-white hover:bg-gray-100 group-focus-visible:ring-2 group-focus-visible:ring-primary group-focus-visible:ring-offset-2">
        <i data-lucide="chevron-left" class="w-4 h-4 text-gray-800 rtl:rotate-180"></i>
        <span class="sr-only">{{ i18n "previous" }}</span>
    </span>
</button>
<button type="button"
    class="carousel-control-btn absolute top-0 end-0 z-30 flex items-center justify-center h-full px-4 cursor-pointer group focus:outline-none"
    data-carousel-next>
    <span class="shadow inline-flex items-center justify-center w-10 h-10 rounded-full bg-white hover:bg-gray-100 group-focus-visible:ring-2 group-focus-visible:ring-primary group-focus-visible:ring-offset-2">
        <i data-lucide="chevron-right" class="w-4 h-4 text-gray-800 rtl:rotate-180"></i>
        <span class="sr-only">{{ i18n "next" }}</span>
    </span>
</button>
{{ end }}
