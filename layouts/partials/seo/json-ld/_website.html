{{ $description := .Page.Params.description | default site.Params.description }}
{{ if and .IsHome site.BaseURL site.Title }}
<!-- WEBSITE -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "url": "{{ site.BaseURL }}",
  "name": "{{ site.Title }}",
  "inLanguage": "{{ site.Language.Locale | default .Lang | default "en" }}"{{ with $description }},
  "description": "{{ . }}"{{ end }}
}
</script>
{{ end }}
