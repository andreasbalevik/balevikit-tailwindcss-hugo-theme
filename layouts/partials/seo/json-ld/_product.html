{{- $ISO8601 := "2006-01-02T15:04:05-07:00" -}}

{{ $productSection := .Site.Params.product_section | default "products" }}
{{ if eq .Section $productSection }}
<!-- PRODUCT / SERVICE SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["Product", "TouristTrip"],
  "name": "{{ .Title }}",
  "description": "{{ .Page.Params.description }}",
  {{ with .Page.Params.images }}
    {{ range first 1 . }}
      {{ $image := resources.GetMatch .src }}
      {{ if $image }}
  "image": [
    "{{ $image.Permalink }}"
      {{ end }}
    {{ end }}
    {{ range after 1 . }}
      {{ $image := resources.GetMatch .src }}
      {{ if $image }}
    ,"{{ $image.Permalink }}"
      {{ end }}
    {{ end }}
  ],
  {{ else }}
  "image": ["{{ .Site.Params.brand_image | absURL }}"],
  {{ end }}
  "url": "{{ .Permalink }}",
  {{ with .Page.Params.product_info.sku }}"sku": "{{ . }}",{{ end }}
  "brand": {
    "@type": "Brand",
    "name": "{{ .Site.Title }}"
  },
  "provider": {
    "@type": "LocalBusiness",
    "name": "{{ .Site.Title }}"
    {{ with .Site.Params.address }}
    ,"address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ . }}"
      {{ with $.Site.Params.addressLocality }},"addressLocality": "{{ . }}"{{ end }}
      {{ with $.Site.Params.addressRegion }},"addressRegion": "{{ . }}"{{ end }}
      {{ with $.Site.Params.postalCode }},"postalCode": "{{ . }}"{{ end }}
      ,"addressCountry": "{{ $.Site.Params.addressCountry | default "NO" }}"
    }
    {{ end }}
    {{ if and .Site.Params.latitude .Site.Params.longitude }}
    ,"geo": {
      "@type": "GeoCoordinates",
      "latitude": "{{ .Site.Params.latitude }}",
      "longitude": "{{ .Site.Params.longitude }}"
    }
    {{ end }}
    ,"telephone": "{{ .Site.Params.phone }}"
    ,"email": "{{ .Site.Params.email }}"
    ,"url": "{{ .Site.BaseURL }}"
  },
  {{ with .Page.Params.product_info }}
  "offers": {
    "@type": "AggregateOffer",
    "priceCurrency": "{{ $.Site.Params.currency | default "NOK" }}",
    {{ with .prices }}
      {{ $firstPrice := index . 0 }}
      {{ $lastPrice := index . (sub (len .) 1) }}
    "lowPrice": "{{ $firstPrice.price }}",
    "highPrice": "{{ $lastPrice.price }}",
    "offerCount": "{{ len . }}",
    {{ end }}
    "availability": "https://schema.org/InStock",
    "url": "{{ $.Permalink }}",
    "priceValidUntil": "2027-12-31"
  },
  {{ with .duration }}
  "duration": "PT{{ .hours }}H{{ .minutes }}M",
  {{ end }}
  {{ with .persons }}
  "touristType": "{{ if eq . "7" }}Small Group (up to {{ . }} people){{ else }}Private Tour (up to {{ . }} people){{ end }}"
  {{ end }}
  {{ end }}
  {{ with .Page.Params.aggregateRating }}
  ,"aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ .ratingValue }}",
    "reviewCount": "{{ .reviewCount }}",
    "bestRating": "5",
    "worstRating": "1"
  }
  {{ end }}
  {{ with .Page.Params.tags }}
  ,"category": [
    {{ range $index, $tag := . }}
      {{ if $index }},{{ end }}
      "{{ $tag }}"
    {{ end }}
  ]
  {{ end }}
  {{ with .Page.Params.keywords }}
  ,"keywords": "{{ delimit (first 10 .) ", " }}"
  {{ end }}
}
</script>

<!-- BREADCRUMB SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ with .Site.GetPage $productSection }}{{ .Title }}{{ else }}{{ $productSection | title }}{{ end }}",
      "item": "{{ .Site.BaseURL }}{{ $productSection }}/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}
