{{ $productSection := .Site.Params.product_section | default "products" }}
{{ $description := .Page.Params.description | default (.Summary | plainify) }}
{{ if and .IsPage (eq .Section $productSection) $description }}
<!-- PRODUCT / SERVICE SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ .Title }}",
  "description": "{{ $description }}",
  "url": "{{ .Permalink }}"{{ with .Page.Params.product_info.sku }},
  "sku": "{{ . }}"{{ end }}{{ with .Page.Params.images }}
    {{ range first 1 . }}
      {{ with $.Page.Resources.GetMatch .src }},
  "image": [
    "{{ .Permalink }}"
      {{ else }},
  "image": [
    "{{ .src | absURL }}"
      {{ end }}
    {{ end }}
    {{ range after 1 . }}
      {{ with $.Page.Resources.GetMatch .src }}
    ,"{{ .Permalink }}"
      {{ else }}
    ,"{{ .src | absURL }}"
      {{ end }}
    {{ end }}
  ]{{ end }},
  "brand": {
    "@type": "Brand",
    "name": "{{ .Site.Title }}"
  },
  "provider": {
    "@type": "Organization",
    "name": "{{ .Site.Title }}",
    "url": "{{ .Site.BaseURL }}"{{ with .Site.Params.address }},
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ . }}"{{ with $.Site.Params.addressLocality }},
      "addressLocality": "{{ . }}"{{ end }}{{ with $.Site.Params.addressRegion }},
      "addressRegion": "{{ . }}"{{ end }}{{ with $.Site.Params.postalCode }},
      "postalCode": "{{ . }}"{{ end }},
      "addressCountry": "{{ $.Site.Params.addressCountry | default "NO" }}"
    }{{ end }}{{ if and .Site.Params.latitude .Site.Params.longitude }},
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": "{{ .Site.Params.latitude }}",
      "longitude": "{{ .Site.Params.longitude }}"
    }{{ end }}{{ with .Site.Params.phone }},
    "telephone": "{{ . }}"{{ end }}{{ with .Site.Params.email }},
    "email": "{{ . }}"{{ end }}
  }{{ with .Page.Params.product_info }},
  "offers": {
    "@type": "AggregateOffer",
    "priceCurrency": "{{ $.Site.Params.currency | default "NOK" }}"{{ with .prices }}
      {{ $firstPrice := index . 0 }}
      {{ $lastPrice := index . (sub (len .) 1) }},
    "lowPrice": "{{ $firstPrice.price }}",
    "highPrice": "{{ $lastPrice.price }}",
    "offerCount": "{{ len . }}"{{ end }},
    "availability": "https://schema.org/InStock",
    "url": "{{ $.Permalink }}"{{ with .priceValidUntil }},
    "priceValidUntil": "{{ . }}"{{ end }}
  }{{ end }}{{ with .Page.Params.aggregateRating }},
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "{{ .ratingValue }}",
    "reviewCount": "{{ .reviewCount }}",
    "bestRating": "5",
    "worstRating": "1"
  }{{ end }}{{ with .Page.Params.tags }},
  "category": [{{ range $index, $tag := . }}{{ if $index }}, {{ end }}"{{ $tag }}"{{ end }}]{{ end }}{{ with .Page.Params.keywords }},
  "keywords": "{{ delimit (first 10 .) ", " }}"{{ end }}
}
</script>

<!-- BREADCRUMB SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ with .Site.GetPage $productSection }}{{ .Title }}{{ else }}{{ $productSection | title }}{{ end }}",
      "item": "{{ .Site.BaseURL }}{{ $productSection }}/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}
