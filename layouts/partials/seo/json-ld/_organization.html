<!-- ORGANIZATION -->
<script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "url": "{{ .Site.BaseURL }}",
      "name": "{{ .Site.Title }}",
      {{ with .Site.Params.logo }}"logo": "{{ . | absURL }}",{{ end }}
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "{{ .Site.Params.email }}",
        "telephone": "{{ .Site.Params.phone }}",
        "contactType": "customer service"
      },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ .Site.Params.address }}",
        "addressLocality": "Balestrand",
        "addressRegion": "Vestland",
        "postalCode": "6899",
        "addressCountry": "NO"
      },
      "sameAs": [
        "https://www.instagram.com/balestrandfjordangling/",
        "https://www.facebook.com/balestrandfjordangling/"
      ],
      "founder": {
        "@type": "Person",
        "name": "Captain Tor Balevik"
      },
      "areaServed": {
        "@type": "GeoCircle",
        "geoMidpoint": {
          "@type": "GeoCoordinates",
          "latitude": "61.2069",
          "longitude": "6.5278"
        },
        "geoRadius": "50000"
      }
    }
</script>
