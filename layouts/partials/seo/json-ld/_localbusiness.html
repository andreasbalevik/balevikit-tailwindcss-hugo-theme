{{ if .IsHome }}
<!-- LOCAL BUSINESS SCHEMA -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "@id": "{{ .Site.BaseURL }}#localbusiness",
  "name": "{{ .Site.Title }}",
  "description": "{{ .Page.Params.description | default .Site.Params.description }}"
  {{ with .Page.Params.images }}
    {{ range first 1 . }}
      {{ $image := resources.GetMatch .src }}
      {{ if $image }}
  ,"image": "{{ $image.Permalink }}"
      {{ end }}
    {{ end }}
  {{ end }}
  ,"url": "{{ .Site.BaseURL }}"
  ,"telephone": "{{ .Site.Params.phone }}"
  ,"email": "{{ .Site.Params.email }}"
  {{ with .Site.Params.address }}
  ,"address": {
    "@type": "PostalAddress",
    "streetAddress": "{{ . }}"
    {{ with $.Site.Params.addressLocality }},"addressLocality": "{{ . }}"{{ end }}
    {{ with $.Site.Params.addressRegion }},"addressRegion": "{{ . }}"{{ end }}
    {{ with $.Site.Params.postalCode }},"postalCode": "{{ . }}"{{ end }}
    ,"addressCountry": "{{ $.Site.Params.addressCountry | default "NO" }}"
  }
  {{ end }}
  {{ if and .Site.Params.latitude .Site.Params.longitude }}
  ,"geo": {
    "@type": "GeoCoordinates",
    "latitude": "{{ .Site.Params.latitude }}",
    "longitude": "{{ .Site.Params.longitude }}"
  }
  {{ end }}
  {{ with .Site.Params.openingHours }}
  ,"openingHoursSpecification": {
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": {{ .dayOfWeek | jsonify }},
    "opens": "{{ .opens }}",
    "closes": "{{ .closes }}"
  }
  {{ end }}
  {{ with .Site.Params.priceRange }}
  ,"priceRange": "{{ . }}"
  {{ end }}
  {{ if and .Site.Params.latitude .Site.Params.longitude .Site.Params.areaServedRadius }}
  ,"areaServed": {
    "@type": "GeoCircle",
    "geoMidpoint": {
      "@type": "GeoCoordinates",
      "latitude": "{{ .Site.Params.latitude }}",
      "longitude": "{{ .Site.Params.longitude }}"
    },
    "geoRadius": "{{ .Site.Params.areaServedRadius }}"
  }
  {{ end }}
  {{ with .Site.Params.hasMap }}
  ,"hasMap": "{{ . }}"
  {{ end }}
  {{ with .Site.Params.social }}
  {{ $urls := slice }}{{ range . }}{{ $urls = $urls | append . }}{{ end }}
  {{ if $urls }},"sameAs": [{{ range $i, $url := $urls }}{{ if $i }},{{ end }}"{{ $url }}"{{ end }}]{{ end }}
  {{ end }}
}
</script>
{{ end }}
