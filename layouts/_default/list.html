{{ define "main" }}

<div class="container">

  <h1 class="text-3xl md:text-4xl lg:text-5xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-6">
    {{ .Title }}
  </h1>

  {{- with .Content }}
  <div class="prose max-w-none mb-12">
    {{ . }}
  </div>
  {{- end }}

  <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 list-none p-0 m-0">
    {{ range .Pages }}
    <li>
      <a href="{{ .Permalink }}" class="block bg-white border border-gray-200 rounded-lg shadow-sm p-6 hover:shadow-md transition-shadow">
        <h2 class="text-xl md:text-2xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-3 text-gray-900">
          {{ .Title }}
        </h2>
        {{- with .Params.description }}
        <p class="text-base leading-relaxed text-pretty text-gray-700 mb-3">{{ . }}</p>
        {{- end }}
        {{- if not .Date.IsZero }}
        <p class="text-base text-gray-700">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date | time.Format "2. January 2006" }}</time>
        </p>
        {{- end }}
      </a>
    </li>
    {{ end }}
  </ul>

</div>

{{ end }}
