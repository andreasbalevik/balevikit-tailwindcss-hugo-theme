{{ define "main" }}

<div class="container">
  <div class="bg-white border border-gray-200 rounded-lg shadow-sm p-8 md:p-12 max-w-2xl mx-auto text-center">

    <h1 class="text-3xl md:text-4xl font-medium leading-[1.2] tracking-[-0.015em] text-balance mt-0 mb-4">
      404 — Siden finnes ikke
    </h1>

    <p class="text-lg leading-relaxed text-pretty text-gray-700 mb-8">
      Siden du leter etter er flyttet, slettet eller har aldri eksistert.
    </p>

    <a href="{{ .Site.Home.Permalink }}"
       class="inline-flex items-center gap-2 text-base font-semibold text-primary hover:underline">
      <i data-lucide="arrow-left" class="w-5 h-5" aria-hidden="true"></i>
      {{ i18n "tilbake" | default "Tilbake til forsiden" }}
    </a>

  </div>
</div>

{{ end }}
